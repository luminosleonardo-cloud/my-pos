<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>ประวัติการขาย — ร้านขายของชำ</title>
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#16a34a">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="POS ชำ">
  <link rel="apple-touch-icon" href="icons/icon.svg">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

  <div class="app-shell">

    <!-- ========== SIDEBAR ========== -->
    <aside class="sidebar">
      <div class="sidebar-brand">
        <div class="brand-icon">📊</div>
        <span class="brand-name" id="brand-name">ร้านขายของชำ</span>
        <span id="sync-dot" class="sync-dot" title="ไม่ได้เชื่อมต่อ cloud"></span>
      </div>
      <nav class="sidebar-nav">
        <a href="index.html" class="sidebar-link">
          <span class="sl-icon">🛒</span>
          <span class="sl-label">หน้าขาย (POS)</span>
        </a>
        <a href="inventory.html" class="sidebar-link">
          <span class="sl-icon">📦</span>
          <span class="sl-label">คลังสินค้า</span>
          <span id="inv-badge" class="inv-badge" style="display:none">0</span>
        </a>
        <a href="sales.html" class="sidebar-link active">
          <span class="sl-icon">📊</span>
          <span class="sl-label">ประวัติการขาย</span>
        </a>
        <a href="reports.html" class="sidebar-link">
          <span class="sl-icon">💹</span>
          <span class="sl-label">รายงานกำไร</span>
        </a>
        <a href="settings.html" class="sidebar-link">
          <span class="sl-icon">🏪</span>
          <span class="sl-label">ตั้งค่าร้าน</span>
        </a>
        <a href="#" class="sidebar-link" onclick="openShiftModal();return false">
          <span class="sl-icon">⏰</span>
          <span class="sl-label" id="shift-link-text">เปิด/ปิดกะ</span>
          <span id="shift-indicator" class="hw-dot"></span>
        </a>
      </nav>
      <div class="sidebar-footer">
        <span id="clock" class="sidebar-clock"></span>
      </div>
    </aside>

    <!-- ========== MAIN ========== -->
    <main class="app-main scrollable">

      <div class="inv-layout">

        <!-- Stats -->
        <div class="stats-grid" id="sales-stats"></div>

        <!-- Period filter tabs + export + AI -->
        <div class="sales-toolbar">
          <div class="sales-period-tabs">
            <button class="tab-btn active" data-period="today"     onclick="setPeriod('today')">วันนี้</button>
            <button class="tab-btn"        data-period="yesterday" onclick="setPeriod('yesterday')">เมื่อวาน</button>
            <button class="tab-btn"        data-period="7days"     onclick="setPeriod('7days')">7 วันล่าสุด</button>
            <button class="tab-btn"        data-period="30days"    onclick="setPeriod('30days')">30 วันล่าสุด</button>
            <button class="tab-btn"        data-period="all"       onclick="setPeriod('all')">ทั้งหมด</button>
          </div>
          <div class="sales-toolbar-actions">
            <button class="btn btn-outline btn-sm" onclick="exportCSV()" title="ส่งออกข้อมูลช่วงที่เลือกเป็น CSV">
              📥 Export
            </button>
            <button class="btn btn-ai btn-sm" id="btn-analyze" onclick="analyzeWithAI()" title="วิเคราะห์ยอดขายด้วย AI">
              🤖 วิเคราะห์ AI
            </button>
            <button class="btn btn-ai btn-sm" onclick="summarizeToday()" title="สร้างสรุปยอดขายวันนี้สำหรับส่ง LINE">
              📋 สรุปวันนี้
            </button>
          </div>
        </div>

        <!-- AI Result Panel -->
        <div id="ai-panel" class="ai-panel" style="display:none">
          <div class="ai-panel-header">
            <span class="ai-panel-title" id="ai-panel-title">🤖 วิเคราะห์โดย AI</span>
            <button class="modal-close" onclick="closeAIPanel()">✕</button>
          </div>
          <div class="ai-panel-body" id="ai-panel-body"></div>
        </div>

        <!-- Sales list -->
        <div id="sales-list"></div>

        <!-- Modal: Daily Summary -->
        <div id="modal-daily-summary" class="modal-backdrop">
          <div class="modal">
            <div class="modal-header">
              <span class="modal-title">📋 สรุปยอดขายวันนี้</span>
              <button class="modal-close" onclick="closeModal('modal-daily-summary')">✕</button>
            </div>
            <div class="modal-body">
              <pre id="daily-summary-text" class="daily-summary-pre">⏳ กำลังสร้างสรุป…</pre>
            </div>
            <div class="modal-footer">
              <button class="btn btn-ghost" onclick="closeModal('modal-daily-summary')">ปิด</button>
              <button class="btn btn-primary" onclick="copySummary()">📋 คัดลอก</button>
            </div>
          </div>
        </div>

      </div>

    </main>

  </div><!-- /app-shell -->

  <!-- ========== MODAL: Reprint Receipt ========== -->
  <div id="modal-reprint" class="modal-backdrop">
    <div class="modal">
      <div class="modal-header">
        <span class="modal-title">🧾 ใบเสร็จรับเงิน (พิมพ์ซ้ำ)</span>
        <button class="modal-close" onclick="closeModal('modal-reprint')">✕</button>
      </div>
      <div id="print-receipt" class="modal-body">
        <div id="reprint-content"></div>
      </div>
      <div class="modal-footer">
        <button class="btn btn-ghost" onclick="window.print()">🖨️ พิมพ์ (PDF)</button>
        <button class="btn btn-primary" onclick="closeModal('modal-reprint')">ปิด</button>
      </div>
    </div>
  </div>

  <!-- Toast container -->
  <div id="toast-container"></div>

  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
  <script src="js/db.js"></script>
  <script src="js/shared.js"></script>
  <script src="js/sync.js"></script>
  <script src="js/agents.js"></script>
  <script src="js/sales.js"></script>
  <script>
    if ('serviceWorker' in navigator) navigator.serviceWorker.register('./sw.js');
    document.addEventListener('DOMContentLoaded', () => Sync.init());
  </script>
</body>
</html>
