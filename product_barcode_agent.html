
<style>
  h2.sr-only{position:absolute;width:1px;height:1px;overflow:hidden;clip:rect(0,0,0,0)}
  #app{padding:1rem 0;font-family:var(--font-sans)}
  #scanner-box{background:var(--color-background-secondary);border-radius:var(--border-radius-lg);border:0.5px solid var(--color-border-tertiary);overflow:hidden;position:relative;width:100%;aspect-ratio:4/3;max-height:300px;display:flex;align-items:center;justify-content:center}
  #scanner-box video{width:100%;height:100%;object-fit:cover;display:none}
  #scanner-box canvas{display:none}
  .scan-overlay{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:8px;pointer-events:none}
  .scan-frame{width:200px;height:100px;border:2px solid #378ADD;border-radius:8px;position:relative}
  .scan-line{position:absolute;top:0;left:0;right:0;height:2px;background:#378ADD;animation:scanline 1.5s ease-in-out infinite}
  @keyframes scanline{0%{top:0}50%{top:calc(100% - 2px)}100%{top:0}}
  .placeholder-icon{font-size:48px;color:var(--color-text-tertiary)}
  .placeholder-text{font-size:13px;color:var(--color-text-secondary)}
  #status-bar{font-size:13px;color:var(--color-text-secondary);margin:8px 0;min-height:20px;text-align:center}
  .btn-row{display:flex;gap:8px;margin:8px 0}
  button{flex:1;padding:8px 12px;border-radius:var(--border-radius-md);border:0.5px solid var(--color-border-secondary);background:var(--color-background-primary);color:var(--color-text-primary);font-size:14px;cursor:pointer;transition:background 0.15s}
  button:hover{background:var(--color-background-secondary)}
  button:disabled{opacity:0.4;cursor:not-allowed}
  button.primary{background:#378ADD;color:#fff;border-color:#378ADD}
  button.primary:hover{background:#185FA5}
  #manual-row{display:flex;gap:8px;margin:4px 0}
  #manual-row input{flex:1;padding:8px 10px;border-radius:var(--border-radius-md);border:0.5px solid var(--color-border-secondary);background:var(--color-background-primary);color:var(--color-text-primary);font-size:14px}
  #result-area{margin-top:1rem;display:none}
  .product-card{background:var(--color-background-primary);border-radius:var(--border-radius-lg);border:0.5px solid var(--color-border-tertiary);padding:1rem 1.25rem}
  .product-header{display:flex;gap:12px;align-items:flex-start;margin-bottom:12px}
  .product-img{width:80px;height:80px;object-fit:contain;border-radius:var(--border-radius-md);border:0.5px solid var(--color-border-tertiary);background:var(--color-background-secondary)}
  .product-img-placeholder{width:80px;height:80px;border-radius:var(--border-radius-md);border:0.5px solid var(--color-border-tertiary);background:var(--color-background-secondary);display:flex;align-items:center;justify-content:center;font-size:28px;flex-shrink:0}
  .product-info{flex:1;min-width:0}
  .product-name{font-size:15px;font-weight:500;color:var(--color-text-primary);margin:0 0 4px}
  .product-brand{font-size:13px;color:var(--color-text-secondary);margin:0 0 6px}
  .product-price{font-size:16px;font-weight:500;color:#0F6E56}
  .product-barcode{font-size:12px;color:var(--color-text-tertiary);margin:0 0 2px}
  .product-body{font-size:13px;color:var(--color-text-secondary);line-height:1.6;border-top:0.5px solid var(--color-border-tertiary);padding-top:10px}
  .cache-badge{display:inline-block;font-size:11px;padding:2px 8px;border-radius:99px;background:var(--color-background-info);color:var(--color-text-info);margin-left:8px}
  #history-area{margin-top:1rem}
  .history-title{font-size:13px;font-weight:500;color:var(--color-text-secondary);margin-bottom:8px}
  .history-list{display:flex;flex-direction:column;gap:6px}
  .history-item{display:flex;align-items:center;gap:10px;padding:8px 10px;background:var(--color-background-secondary);border-radius:var(--border-radius-md);cursor:pointer;border:0.5px solid var(--color-border-tertiary)}
  .history-item:hover{background:var(--color-background-primary)}
  .hi-barcode{font-size:12px;color:var(--color-text-tertiary);font-family:var(--font-mono)}
  .hi-name{font-size:13px;color:var(--color-text-primary);flex:1}
  .loading-dots::after{content:'';animation:dots 1.2s steps(3,end) infinite}
  @keyframes dots{0%{content:''}33%{content:'.'}66%{content:'..'}100%{content:'...'}}
</style>

<h2 class="sr-only">เอเจนค้นหาข้อมูลสินค้าจากบาร์โค้ด</h2>
<div id="app">
  <div id="scanner-box">
    <video id="video" autoplay playsinline></video>
    <canvas id="canvas"></canvas>
    <div class="scan-overlay" id="overlay">
      <i class="ti ti-barcode placeholder-icon" aria-hidden="true"></i>
      <span class="placeholder-text">กดปุ่มเปิดกล้องเพื่อสแกน</span>
    </div>
    <div class="scan-overlay" id="scan-anim" style="display:none">
      <div class="scan-frame"><div class="scan-line"></div></div>
    </div>
  </div>

  <div id="status-bar">พร้อมใช้งาน</div>

  <div class="btn-row">
    <button class="primary" id="btn-camera" onclick="toggleCamera()"><i class="ti ti-camera" aria-hidden="true"></i> เปิดกล้อง</button>
    <button id="btn-stop" onclick="stopCamera()" disabled><i class="ti ti-player-stop" aria-hidden="true"></i> หยุด</button>
  </div>

  <div id="manual-row">
    <input id="manual-input" type="text" placeholder="หรือพิมพ์บาร์โค้ดเอง เช่น 8851234567890" />
    <button onclick="lookupManual()"><i class="ti ti-search" aria-hidden="true"></i> ค้นหา</button>
  </div>

  <div id="result-area"></div>
  <div id="history-area" style="display:none">
    <p class="history-title"><i class="ti ti-history" aria-hidden="true" style="font-size:14px;vertical-align:-1px;margin-right:4px"></i>ค้นหาล่าสุด (จำในหน่วยความจำ)</p>
    <div class="history-list" id="history-list"></div>
  </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/quagga/0.12.1/quagga.min.js"></script>
<script>
const cache = {};
const history = [];
let scanning = false;
let stream = null;

function setStatus(msg){document.getElementById('status-bar').textContent = msg}

function toggleCamera(){
  if(scanning){stopCamera();return}
  const video = document.getElementById('video');
  const overlay = document.getElementById('overlay');
  const scanAnim = document.getElementById('scan-anim');
  navigator.mediaDevices.getUserMedia({video:{facingMode:'environment'},audio:false})
    .then(s=>{
      stream = s;
      video.srcObject = s;
      video.style.display='block';
      overlay.style.display='none';
      scanAnim.style.display='flex';
      document.getElementById('btn-camera').disabled=true;
      document.getElementById('btn-stop').disabled=false;
      scanning=true;
      setStatus('สแกนบาร์โค้ด — จ่อกล้องไปที่บาร์โค้ด');
      startQuagga();
    })
    .catch(()=>setStatus('ไม่สามารถเข้าถึงกล้องได้ — ลองพิมพ์บาร์โค้ดเอง'));
}

function stopCamera(){
  if(stream)stream.getTracks().forEach(t=>t.stop());
  Quagga.stop();
  const video = document.getElementById('video');
  video.style.display='none';
  document.getElementById('overlay').style.display='flex';
  document.getElementById('scan-anim').style.display='none';
  document.getElementById('btn-camera').disabled=false;
  document.getElementById('btn-camera').innerHTML='<i class="ti ti-camera" aria-hidden="true"></i> เปิดกล้อง';
  document.getElementById('btn-stop').disabled=true;
  scanning=false;
  setStatus('หยุดสแกน');
}

function startQuagga(){
  Quagga.init({
    inputStream:{name:'Live',type:'LiveStream',target:document.getElementById('video'),constraints:{facingMode:'environment'}},
    decoder:{readers:['ean_reader','ean_8_reader','code_128_reader','code_39_reader','upc_reader','upc_e_reader']}
  },err=>{
    if(err){setStatus('ไม่สามารถเริ่มสแกนได้');return}
    Quagga.start();
  });
  let lastCode='', lastTime=0;
  Quagga.onDetected(result=>{
    const code = result.codeResult.code;
    const now = Date.now();
    if(code===lastCode && now-lastTime<3000)return;
    lastCode=code; lastTime=now;
    stopCamera();
    lookupBarcode(code);
  });
}

function lookupManual(){
  const code = document.getElementById('manual-input').value.trim();
  if(!code){setStatus('กรุณาใส่บาร์โค้ด');return}
  lookupBarcode(code);
}

async function lookupBarcode(code){
  if(cache[code]){
    showResult(cache[code], true);
    setStatus('พบข้อมูลจากหน่วยความจำ ✓');
    return;
  }
  setStatus('กำลังค้นหาข้อมูล' + '...');
  showLoading(code);
  try{
    const res = await fetch('https://api.anthropic.com/v1/messages',{
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify({
        model:'claude-sonnet-4-20250514',
        max_tokens:1000,
        tools:[{type:'web_search_20250305',name:'web_search'}],
        system:`คุณเป็นเอเจนค้นหาข้อมูลสินค้าจากบาร์โค้ด เมื่อได้รับบาร์โค้ดให้ค้นหาข้อมูลสินค้าและตอบกลับเป็น JSON เท่านั้น ไม่ต้องมี markdown หรือ backtick
รูปแบบ JSON ที่ต้องการ:
{"name":"ชื่อสินค้า","brand":"แบรนด์","price":"ราคาโดยประมาณในไทย","category":"หมวดหมู่","description":"รายละเอียดสั้นๆ 1-2 ประโยค","image_url":"URL รูปภาพสินค้าถ้าหาได้","found":true}
ถ้าหาไม่พบให้ตอบ: {"found":false,"name":"ไม่พบข้อมูล","description":"ไม่พบสินค้าในฐานข้อมูล"}`,
        messages:[{role:'user',content:`บาร์โค้ด: ${code}\nค้นหาชื่อสินค้า แบรนด์ ราคาในไทย และรูปภาพ`}]
      })
    });
    const data = await res.json();
    const fullText = data.content.filter(b=>b.type==='text').map(b=>b.text).join('');
    let product;
    try{
      const clean = fullText.replace(/```json|```/g,'').trim();
      product = JSON.parse(clean);
    }catch{
      product = {found:false,name:'ไม่พบข้อมูล',description:'ไม่สามารถแปลงข้อมูลได้'};
    }
    product.barcode = code;
    cache[code] = product;
    if(!history.find(h=>h.barcode===code))history.unshift(product);
    if(history.length>10)history.pop();
    showResult(product, false);
    updateHistory();
    setStatus(product.found ? 'พบข้อมูลสินค้า ✓' : 'ไม่พบข้อมูลสินค้า');
  }catch(e){
    setStatus('เกิดข้อผิดพลาด: '+e.message);
    document.getElementById('result-area').style.display='none';
  }
}

function showLoading(code){
  const el = document.getElementById('result-area');
  el.style.display='block';
  el.innerHTML=`<div class="product-card" style="text-align:center;padding:2rem">
    <i class="ti ti-loader" aria-hidden="true" style="font-size:32px;color:var(--color-text-tertiary)"></i>
    <p style="color:var(--color-text-secondary);font-size:13px;margin:8px 0 0">กำลังค้นหาบาร์โค้ด <code style="font-family:var(--font-mono)">${code}</code><span class="loading-dots"></span></p>
  </div>`;
}

function showResult(p, fromCache){
  const el = document.getElementById('result-area');
  el.style.display='block';
  const badge = fromCache ? '<span class="cache-badge"><i class="ti ti-database" aria-hidden="true" style="font-size:11px"></i> จากหน่วยความจำ</span>' : '';
  const imgHtml = p.image_url
    ? `<img class="product-img" src="${p.image_url}" alt="${p.name}" onerror="this.parentNode.innerHTML='<div class=\\'product-img-placeholder\\'>🛒</div>'">`
    : `<div class="product-img-placeholder">🛒</div>`;
  el.innerHTML=`<div class="product-card">
    <div class="product-header">
      ${imgHtml}
      <div class="product-info">
        <p class="product-barcode"><i class="ti ti-barcode" aria-hidden="true" style="font-size:12px;vertical-align:-1px"></i> ${p.barcode||''}${badge}</p>
        <p class="product-name">${p.name||'-'}</p>
        <p class="product-brand">${p.brand||''}</p>
        ${p.price?`<p class="product-price">${p.price}</p>`:''}
      </div>
    </div>
    ${p.description?`<div class="product-body">${p.description}</div>`:''}
  </div>`;
}

function updateHistory(){
  const area = document.getElementById('history-area');
  const list = document.getElementById('history-list');
  if(!history.length){area.style.display='none';return}
  area.style.display='block';
  list.innerHTML = history.map(p=>`
    <div class="history-item" onclick="showResult(${JSON.stringify(p).replace(/"/g,'&quot;')},true);setStatus('โหลดจากหน่วยความจำ ✓')">
      <span class="hi-barcode">${p.barcode}</span>
      <span class="hi-name">${p.name}</span>
      <i class="ti ti-chevron-right" aria-hidden="true" style="font-size:14px;color:var(--color-text-tertiary)"></i>
    </div>`).join('');
}
</script>
